<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        /* Basic styling to keep things clean */
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        form { max-width: 400px; }
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #form-status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Contact Us</h2>

    <form id="my-form" action="https://formspree.io/f/xnjoynny" method="POST">
        <div class="field">
            <label for="email">Email Address:</label>
            <input type="email" name="email" id="email" required>
        </div>

        <div class="field">
            <label for="message">Message:</label>
            <textarea name="message" id="message" rows="4" required></textarea>
        </div>

        <button id="my-form-button" type="submit">Submit</button>
        
        <p id="form-status"></p>
    </form>

    <script>
        var form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("form-status");
          var data = new FormData(event.target);

          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "Thanks! Your submission was sent successfully.";
              status.style.color = "green";
              form.reset(); // Clears the form fields
            } else {
              response.json().then(data => {
                if (Object.hasOwn(data, 'errors')) {
                  status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                } else {
                  status.innerHTML = "Oops! There was a problem submitting your form.";
                }
                status.style.color = "red";
              })
            }
          }).catch(error => {
            status.innerHTML = "Oops! There was a problem submitting your form.";
            status.style.color = "red";
          });
        }
        
        form.addEventListener("submit", handleSubmit)
    </script>

</body>
</html>
